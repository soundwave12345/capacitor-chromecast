name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ----------------------------------------------------
  #  JS / Typescript Build
  # ----------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm install

    - name: Lint
      run: npm run lint --if-present

    - name: Build
      run: |
        # Build senza docgen in CI
        npm run clean
        tsc
        rollup -c rollup.config.js

    - name: Test
      run: npm test --if-present


  # ----------------------------------------------------
  # Android Plugin Build
  # ----------------------------------------------------
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm install

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Android Plugin
      run: |
        cd android
        gradle build


  # ----------------------------------------------------
  # iOS Plugin Lint
  # ----------------------------------------------------
  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm install

    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods

    - name: Lint iOS Plugin
      run: |
        cd ios
        pod lib lint --allow-warnings
