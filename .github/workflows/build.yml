name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ----------------------------------------------------
  # JS / Typescript Build (Core Plugin)
  # ----------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Ensure package-lock.json exists
      run: |
        if [ ! -f package-lock.json ]; then
          npm install
        fi

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint --if-present

    - name: Build (No DocGen in CI)
      run: npm run build:ci

    - name: Test
      run: npm test --if-present


  # ----------------------------------------------------
  # Android Plugin - Lint / Compile
  # ----------------------------------------------------
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Ensure package-lock.json exists
      run: |
        if [ ! -f package-lock.json ]; then
          npm install
        fi

    - name: Install dependencies
      run: npm ci

    # JDK for Android build
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Install Gradle wrapper if missing
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Android Plugin (Non-fatal)
      run: |
        cd android
        if [ -f "./gradlew" ]; then
          chmod +x gradlew
          ./gradlew build
        else
          echo "⚠ Nessun gradlew trovato, provo gradle..."
          gradle build || echo "⚠ Build Android saltata (non progetto completo)"
        fi


  # ----------------------------------------------------
  # iOS Plugin - CocoaPods Lint
  # ----------------------------------------------------
  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Ensure package-lock.json exists
      run: |
        if [ ! -f package-lock.json ]; then
          npm install
        fi

    - name: Install dependencies
      run: npm ci

    - name: Install CocoaPods
      run: sudo gem install cocoapods
            cd ios
            pod install

 
