name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # Se package-lock.json non esiste, lo creo
    - name: Ensure package-lock.json exists
      run: |
        if [ ! -f package-lock.json ]; then
          echo "package-lock.json non trovato, lo genero..."
          npm install
        fi

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint --if-present

    - name: Build
      run: npm run build

    - name: Test
      run: npm test --if-present


  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Ensure package-lock.json exists
      run: |
        if [ ! -f package-lock.json ]; then
          npm install
        fi

    - name: Install dependencies
      run: npm ci

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android
      run: |
        cd android
        chmod +x gradlew
        ./gradlew build


  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Ensure package-lock.json exists
      run: |
        if [ ! -f package-lock.json ]; then
          npm install
        fi

    - name: Install dependencies
      run: npm ci

    - name: Install CocoaPods
      run: |
        cd ios
        pod install

    - name: Build iOS
      run: |
        cd ios
        xcodebuild -workspace Plugin.xcworkspace \
          -scheme Plugin \
          -destination 'platform=iOS Simulator,name=iPhone 14' \
          build
